<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Open Sans', sans-serif; font-weight: 300; background: #1A1A2E; padding: 16px; }
  .row { display: flex; gap: 10px; }
  .photo { flex: 1; position: relative; overflow: hidden; border-radius: 4px; height: 120px; }
  .photo img { width: 100%; height: 100%; object-fit: cover; object-position: center top; }
  .photo-label { position: absolute; bottom: 0; left: 0; right: 0; padding: 6px 8px; background: linear-gradient(to top, rgba(26,26,46,0.85) 0%, transparent 100%); font-size: 9px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: rgba(255,255,255,0.7); }
</style>
</head><body>
  <div class="row">
    <div class="photo">
      <img src="../assets/photo-portrait.jpg" alt="Portrait">
      <div class="photo-label">Portrait · thoughtful</div>
    </div>
    <div class="photo">
      <img src="../assets/photo-coffee.jpg" alt="Coffee conversation">
      <div class="photo-label">Conversation · warm</div>
    </div>
    <div class="photo">
      <img src="../assets/photo-hotel-call.jpg" alt="On phone">
      <div class="photo-label">In action · professional</div>
    </div>
    <div class="photo">
      <img src="../assets/photo-hotel-lobby.jpg" alt="Standing">
      <div class="photo-label">Composed · confident</div>
    </div>
    <div class="photo">
      <img src="../assets/photo-boat.jpg" alt="Boat">
      <div class="photo-label">Lifestyle · outdoors</div>
    </div>
  </div>
</body></html>
