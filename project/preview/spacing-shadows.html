<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<style>
@font-face {
  font-family: 'Open Sans';
  src: url('../fonts/OpenSans-VariableFont_wdth_wght.ttf') format('truetype');
  font-weight: 100 900; font-style: normal;
}
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Open Sans', sans-serif; font-weight: 300; background: #EAE7E2; padding: 24px; }
  .row { display: flex; gap: 16px; align-items: flex-end; margin-bottom: 16px; }
  .card { background: white; border-radius: 4px; padding: 14px 16px; }
  .label { font-size: 10px; color: #A09B94; font-weight: 300; letter-spacing: 0.06em; text-transform: uppercase; margin-top: 8px; text-align: center; }
  .radii { display: flex; gap: 12px; align-items: center; }
  .r { background: #3B5068; display: flex; align-items: center; justify-content: center; }
  .rlabel { font-size: 9px; color: white; font-weight: 600; }
</style>
</head><body>
  <div class="row">
    <div>
      <div class="card" style="box-shadow: 0 1px 3px rgba(26,26,46,0.08), 0 1px 2px rgba(26,26,46,0.04); width:100px; height:56px;"></div>
      <div class="label">shadow-sm</div>
    </div>
    <div>
      <div class="card" style="box-shadow: 0 4px 12px rgba(26,26,46,0.10), 0 2px 4px rgba(26,26,46,0.06); width:100px; height:56px;"></div>
      <div class="label">shadow-md</div>
    </div>
    <div>
      <div class="card" style="box-shadow: 0 12px 32px rgba(26,26,46,0.12), 0 4px 8px rgba(26,26,46,0.06); width:100px; height:56px;"></div>
      <div class="label">shadow-lg</div>
    </div>
    <div>
      <div class="card" style="box-shadow: 0 24px 48px rgba(26,26,46,0.16), 0 8px 16px rgba(26,26,46,0.08); width:100px; height:56px;"></div>
      <div class="label">shadow-xl</div>
    </div>
  </div>
  <div class="radii">
    <div><div class="r" style="width:36px;height:36px;border-radius:2px;"><span class="rlabel">2</span></div><div class="label">sm</div></div>
    <div><div class="r" style="width:36px;height:36px;border-radius:4px;"><span class="rlabel">4</span></div><div class="label">md</div></div>
    <div><div class="r" style="width:36px;height:36px;border-radius:8px;"><span class="rlabel">8</span></div><div class="label">lg</div></div>
    <div><div class="r" style="width:36px;height:36px;border-radius:12px;"><span class="rlabel">12</span></div><div class="label">xl</div></div>
    <div><div class="r" style="width:36px;height:36px;border-radius:9999px;"><span class="rlabel">∞</span></div><div class="label">full</div></div>
  </div>
</body></html>
