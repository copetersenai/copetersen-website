<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<style>
@font-face {
  font-family: 'Open Sans';
  src: url('../fonts/OpenSans-VariableFont_wdth_wght.ttf') format('truetype');
  font-weight: 100 900; font-style: normal;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Open Sans', sans-serif; font-weight: 300; background: #F7F5F2; padding: 20px; }
.row { display: flex; gap: 8px; }
.swatch { flex: 1; height: 80px; border-radius: 3px; display: flex; align-items: flex-end; padding: 8px; }
.swatch span { font-size: 10px; font-weight: 600; letter-spacing: 0.05em; }
.label { font-size: 10px; color: #6B6560; margin-top: 5px; letter-spacing: 0.08em; text-transform: uppercase; }
.group { margin-bottom: 12px; }
</style>
</head><body>
<div class="group">
  <div class="row">
    <div>
      <div class="swatch" style="background:#1A1A2E"><span style="color:#fff">Ink</span></div>
      <div class="label">#1A1A2E</div>
    </div>
    <div>
      <div class="swatch" style="background:#2E2E4A"><span style="color:#fff">Ink Light</span></div>
      <div class="label">#2E2E4A</div>
    </div>
    <div>
      <div class="swatch" style="background:#c80815"><span style="color:#fff">Red</span></div>
      <div class="label">#c80815</div>
    </div>
    <div>
      <div class="swatch" style="background:#a8060f"><span style="color:#fff">Red Dark</span></div>
      <div class="label">#a8060f</div>
    </div>
    <div>
      <div class="swatch" style="background:#e8192a"><span style="color:#fff">Red Light</span></div>
      <div class="label">#e8192a</div>
    </div>
    <div>
      <div class="swatch" style="background:#3B5068"><span style="color:#fff">Slate</span></div>
      <div class="label">#3B5068</div>
    </div>
    <div>
      <div class="swatch" style="background:#4E6A86"><span style="color:#fff">Slate Mid</span></div>
      <div class="label">#4E6A86</div>
    </div>
    <div>
      <div class="swatch" style="background:#7A9BB8"><span style="color:#fff">Slate Light</span></div>
      <div class="label">#7A9BB8</div>
    </div>
  </div>
</div>
</body></html>
