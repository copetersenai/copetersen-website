<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<style>
@font-face {
  font-family: 'Open Sans';
  src: url('../fonts/OpenSans-VariableFont_wdth_wght.ttf') format('truetype');
  font-weight: 100 900; font-style: normal;
}
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Open Sans', sans-serif; font-weight: 300; background: #F7F5F2; padding: 20px; }
  .row { display: flex; gap: 8px; }
  .swatch { flex: 1; height: 80px; border-radius: 3px; display: flex; align-items: flex-end; padding: 8px; border: 1px solid rgba(0,0,0,0.06); }
  .swatch span { font-size: 10px; font-weight: 600; letter-spacing: 0.05em; }
  .label { font-size: 10px; color: #6B6560; margin-top: 5px; letter-spacing: 0.08em; text-transform: uppercase; }
</style>
</head><body>
<div class="row">
  <div>
    <div class="swatch" style="background:#FFFFFF"><span style="color:#1A1A2E">White</span></div>
    <div class="label">#FFFFFF</div>
  </div>
  <div>
    <div class="swatch" style="background:#F7F5F2"><span style="color:#1A1A2E">Off-white</span></div>
    <div class="label">#F7F5F2</div>
  </div>
  <div>
    <div class="swatch" style="background:#EAE7E2"><span style="color:#1A1A2E">Gray 1</span></div>
    <div class="label">#EAE7E2</div>
  </div>
  <div>
    <div class="swatch" style="background:#D4CFC9"><span style="color:#1A1A2E">Gray 2</span></div>
    <div class="label">#D4CFC9</div>
  </div>
  <div>
    <div class="swatch" style="background:#A09B94"><span style="color:#fff">Gray 3</span></div>
    <div class="label">#A09B94</div>
  </div>
  <div>
    <div class="swatch" style="background:#6B6560"><span style="color:#fff">Gray 4</span></div>
    <div class="label">#6B6560</div>
  </div>
  <div>
    <div class="swatch" style="background:#3D3935"><span style="color:#fff">Gray 5</span></div>
    <div class="label">#3D3935</div>
  </div>
  <div>
    <div class="swatch" style="background:#1A1A2E"><span style="color:#fff">Ink</span></div>
    <div class="label">#1A1A2E</div>
  </div>
</div>
</body></html>
