<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<style>
@font-face {
  font-family: 'Open Sans';
  src: url('../fonts/OpenSans-VariableFont_wdth_wght.ttf') format('truetype');
  font-weight: 100 900; font-style: normal;
}
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Open Sans', sans-serif; font-weight: 300; background: #F7F5F2; padding: 20px; }
  .row { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
  .bar-wrap { flex: 1; background: #EAE7E2; border-radius: 2px; height: 16px; }
  .bar { background: #3B5068; height: 16px; border-radius: 2px; }
  .token { font-size: 10px; color: #A09B94; font-family: 'Courier New', monospace; min-width: 80px; }
  .val { font-size: 10px; color: #1A1A2E; font-weight: 600; min-width: 36px; text-align: right; }
</style>
</head><body>
  <div class="row"><span class="token">--space-1</span><div class="bar-wrap"><div class="bar" style="width:2px"></div></div><span class="val">4px</span></div>
  <div class="row"><span class="token">--space-2</span><div class="bar-wrap"><div class="bar" style="width:4px"></div></div><span class="val">8px</span></div>
  <div class="row"><span class="token">--space-4</span><div class="bar-wrap"><div class="bar" style="width:8px"></div></div><span class="val">16px</span></div>
  <div class="row"><span class="token">--space-6</span><div class="bar-wrap"><div class="bar" style="width:12px"></div></div><span class="val">24px</span></div>
  <div class="row"><span class="token">--space-8</span><div class="bar-wrap"><div class="bar" style="width:16px"></div></div><span class="val">32px</span></div>
  <div class="row"><span class="token">--space-12</span><div class="bar-wrap"><div class="bar" style="width:24px"></div></div><span class="val">48px</span></div>
  <div class="row"><span class="token">--space-16</span><div class="bar-wrap"><div class="bar" style="width:32px"></div></div><span class="val">64px</span></div>
  <div class="row"><span class="token">--space-20</span><div class="bar-wrap"><div class="bar" style="width:40px"></div></div><span class="val">80px</span></div>
  <div class="row"><span class="token">--space-24</span><div class="bar-wrap"><div class="bar" style="width:48px"></div></div><span class="val">96px</span></div>
  <div class="row"><span class="token">--space-32</span><div class="bar-wrap"><div class="bar" style="width:64px"></div></div><span class="val">128px</span></div>
</body></html>
